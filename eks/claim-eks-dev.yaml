apiVersion: compute.platform.urukube.io/v1alpha1
kind: UEks
metadata:
  name: urukube-eks-dev
  namespace: default
  # Dev claim: public endpoint, t3.medium nodes, 2 AZs.
  # vpcId, subnetIds, subnetCidrs, nodeSecurityGroupId and controlPlaneSecurityGroupId
  # come from the UNetwork claim — apply claim-network-dev.yaml first, then copy from:
  #   kubectl get unetwork urukube-network-dev -o yaml | grep -A20 status
spec:
  parameters:
    awsAccountId: "485646919618"
    region: us-east-1
    buId: BU001
    env: dev
    friendlyName: bu001-dev
    # --- values from UNetwork claim status (urukube-network-dev) ---
    vpcId: vpc-09664cdc1e490b3e3
    subnetIds:
      - subnet-04eeb23612078895e   # us-east-1a EKS node subnet
      - subnet-003a88856a24ebd2f   # us-east-1b EKS node subnet
    subnetCidrs:
      - 10.10.0.0/19
      - 10.10.32.0/19
    nodeSecurityGroupId: sg-0b912b696480c2a2f
    controlPlaneSecurityGroupId: sg-05fdcfdd0d9f86fec
    # ---------------------------------------------------------------
    kubernetesVersion: "1.36"
    nodeAmiId: ami-082b37985d4f2aa44   # AL2023 EKS 1.36 x86_64 us-east-1 (2026-06-30)
    endpointAccessType: public
    adminRoleArns:
      - arn:aws:iam::485646919618:role/OrbitClusterEKSAdmin
    tags:
      team: platform
      managed-by: crossplane
