apiVersion: compute.platform.urukube.io/v1alpha1
kind: UEks
metadata:
  name: urukube-eks-explicit
  namespace: default
  # Explicit claim: all optional fields set, demonstrating production-style configuration.
  # Uses private endpoint with restricted public access, larger nodes, and Istio enabled.
  #
  # vpcId, subnetIds, subnetCidrs, nodeSecurityGroupId and controlPlaneSecurityGroupId
  # are sourced from the UNetwork claim status — apply a networking claim first and
  # copy the values from: kubectl get unetwork <name> -o yaml | grep -A20 status
spec:
  parameters:
    awsAccountId: "485646919618"
    region: us-east-1
    buId: BU001
    env: dev
    friendlyName: bu001-dev-exp
    # --- values from UNetwork claim status ---
    vpcId: vpc-0000000000000000
    subnetIds:
      - subnet-0000000000000000 # us-east-1a EKS node subnet
      - subnet-0000000000000001 # us-east-1b EKS node subnet
    subnetCidrs:
      - 10.20.0.0/19
      - 10.20.32.0/19
    nodeSecurityGroupId: sg-0000000000000000
    controlPlaneSecurityGroupId: sg-0000000000000001
    # -----------------------------------------
    kubernetesVersion: "1.36"
    endpointAccessType: private_with_public_cidrs
    endpointPublicAccessCidrs:
      - 203.0.113.0/24 # replace with your office/VPN CIDR
    nodeInstanceType: m5.large
    amiType: AL2023_x86_64_STANDARD
    minSize: 2
    maxSize: 6
    desiredSize: 3
    maxPodsPerNode: 58
    enableIstio: true
    tags:
      team: platform
      managed-by: crossplane
