apiVersion: compute.platform.urukube.io/v1alpha1
kind: UEks
metadata:
  name: urukube-eks-minimal
  namespace: default
  # Minimal claim: only required fields. All node/cluster settings use defaults:
  #   kubernetesVersion: "1.36"
  #   nodeInstanceType:  t3.medium
  #   minSize/maxSize/desiredSize: 2/3/2
  #   endpointAccessType: private
  #   maxPodsPerNode: 30
  #
  # vpcId, subnetIds, subnetCidrs, nodeSecurityGroupId and controlPlaneSecurityGroupId
  # are sourced from the UNetwork claim status — apply a networking claim first and
  # copy the values from: kubectl get unetwork <name> -o yaml | grep -A20 status
spec:
  parameters:
    awsAccountId: "485646919618"
    region: us-east-1
    buId: BU001
    env: dev
    friendlyName: bu001-dev
    # --- values from UNetwork claim status ---
    vpcId: vpc-0b53d10d8690a21bc
    subnetIds:
      - subnet-004d18fc6ea1d88a7   # us-east-1a EKS node subnet
      - subnet-023d096bd550669ad   # us-east-1b EKS node subnet
    subnetCidrs:
      - 10.10.0.0/19
      - 10.10.32.0/19
    nodeSecurityGroupId: sg-02500e667cfc3584f
    controlPlaneSecurityGroupId: sg-0c6e0ffad29698af2
    kubernetesVersion: "1.36"
    nodeAmiId: ami-082b37985d4f2aa44   # AL2023 EKS 1.36 x86_64 us-east-1 (2026-06-30)
    # -----------------------------------------
    tags:
      team: platform
      managed-by: crossplane
