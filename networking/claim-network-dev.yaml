apiVersion: networking.platform.urukube.io/v1alpha1
kind: UNetwork
metadata:
  name: urukube-network-dev
  namespace: default
  # Dev claim: single NAT gateway (cost-optimised), 2 AZs, VPC endpoints enabled.
  # Subnet CIDRs are auto-computed from vpcCidr:
  #   EKS nodes:  10.10.0.0/19, 10.10.32.0/19
  #   Resources:  10.10.64.0/19, 10.10.96.0/19
  #   Public:     10.10.192.0/24, 10.10.193.0/24
spec:
  parameters:
    awsAccountId: "485646919618"
    region: us-east-1
    buId: BU001
    env: dev
    friendlyName: bu001-dev
    vpcCidr: 10.10.0.0/16
    azs:
      - us-east-1a
      - us-east-1b
    singleNatGateway: true
    enableVpcEndpoints: true
    enableFlowLogs: false
    tags:
      team: platform
      managed-by: crossplane
